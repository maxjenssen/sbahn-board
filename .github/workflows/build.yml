name: build

on: [push, pull_request]

jobs:
  compile-firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: arduino/compile-sketches@v1
        with:
          fqbn: esp8266:esp8266:d1_mini
          platforms: |
            - name: esp8266:esp8266
              source-url: https://arduino.esp8266.com/stable/package_esp8266com_index.json
          libraries: |
            - name: WiFiManager
            - name: ArduinoJson
            - name: Adafruit GFX Library
            - name: Adafruit BusIO
            - source-url: https://github.com/markruys/arduino-Max72xxPanel.git
          sketch-paths: |
            - .

  host-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: g++ -std=c++17 -DHOST_TEST -I. -o /tmp/boardlogic-tests test/test_boardlogic.cpp && /tmp/boardlogic-tests
      - run: g++ -std=c++17 -DHOST_TEST -I. -o /tmp/irislogic-tests test/test_irislogic.cpp && /tmp/irislogic-tests
